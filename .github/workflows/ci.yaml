    name: build ${{ matrix.attrs.name }}
    needs:
    - flake-check
    runs-on: ${{ matrix.attrs.runsOn }}
    steps:
    - if: ${{ runner.os != 'macOS' }}
      name: Clear out space for Nix (not on macOS)
      uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7
    - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea
