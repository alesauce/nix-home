      with:
        jobs: ${{ toJSON(needs) }}
    timeout-minutes: 5
  flake-check:
    runs-on: ubuntu-latest
    steps:
    - if: ${{ runner.os != 'macOS' }}
      name: Clear out space for Nix (not on macOS)
      uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7
    - uses: DeterminateSystems/nix-installer-action@90bb610b90bf290cad97484ba341453bd1cbefea
      with:
        extra-conf: |-
          accept-flake-config = true
          always-allow-substitutes = true
          builders-use-substitutes = true
          max-jobs = auto
    - name: nix flake show
      run: nix flake show 'github:${{ github.repository }}/${{ github.sha }}'
