        extra-conf: |-
          accept-flake-config = true
          always-allow-substitutes = true
          builders-use-substitutes = true
          max-jobs = auto
    - name: nix-fast-build
      run: nix run 'github:${{ github.repository }}/${{ github.sha }}#nix-fast-build'
        -- --no-nom --skip-cached --retries=3 --option accept-flake-config true --flake='github:${{
        github.repository }}/${{ github.sha }}#${{ matrix.attrs.attr }}'
    strategy:
      fail-fast: false
      matrix:
        attrs:
        - attr: nixosConfigurations.sanderson.config.system.build.toplevel
          name: sanderson
          runsOn: ubuntu-latest
        - attr: darwinConfigurations.vonnegut.system
          name: vonnegut
          runsOn: macos-latest
        - attr: devShells.x86_64-linux.default.inputDerivation
          name: devShell-x86_64-linux
          runsOn: ubuntu-latest
        - attr: devShells.aarch64-darwin.default.inputDerivation
          name: devShell-aarch64-darwin
          runsOn: macos-latest
    timeout-minutes: 60
  check:
    if: always()
    needs:
    - flake-check
    - build
    runs-on: ubuntu-latest
    steps:
